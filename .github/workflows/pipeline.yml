
name: Tourism MLOps Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      # Step 1: Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Step 3: Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.2
          pip install numpy==1.26.4
          pip install scikit-learn==1.6.1
          pip install streamlit==1.35.0
          pip install xgboost==2.1.1
          pip install mlflow
          pip install datasets
          pip install huggingface_hub
          pip install joblib

      # Step 4: Verify Python Environment
      - name: Verify Installed Packages
        run: |
          python --version
          pip list

      # Step 5: Validate Deployment Files
      - name: Validate Deployment Files
        run: |
          test -f deployment/app.py
          test -f deployment/Dockerfile
          test -f deployment/requirements.txt

      # Step 7: Success Message
      - name: Pipeline Completed
        run: echo "MLOps pipeline executed successfully."
