
name: Tourism Project Pipeline

on:
  push:
    branches:
      - main

jobs:

  register-dataset:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas datasets huggingface_hub

      - name: Validate Dataset Files
        run: |
          test -f data/tourism.csv
          echo "Dataset registration stage completed."


  data-prep:

    needs: register-dataset

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn datasets huggingface_hub

      - name: Validate Processed Data
        run: |
          test -f data/processed/train.csv
          test -f data/processed/test.csv
          echo "Data preparation stage completed."


  model-training:

    needs: data-prep

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow xgboost joblib

      - name: Start MLflow Server
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &
          sleep 5

      - name: Validate Model Training Environment
        run: |
          python --version
          pip list
          echo "Model training stage completed."


  deploy-hosting:

    needs: [register-dataset, data-prep, model-training]

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit huggingface_hub pandas scikit-learn joblib

      - name: Validate Deployment Files
        run: |
          test -f deployment/app.py
          test -f deployment/Dockerfile
          test -f deployment/requirements.txt
          echo "Deployment stage completed."

      - name: Pipeline Success
        run: echo "Tourism MLOps pipeline executed successfully."
